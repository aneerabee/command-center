.srv{background:linear-gradient(180deg,#030812,#0B0B0F);position:relative}
.srv::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,#ffffff02 2px,#ffffff02 4px);pointer-events:none;opacity:.3}
.hud{max-width:900px;margin:0 auto;position:relative}
.hud-title{text-align:center;margin-bottom:28px}.hud-title h2{font-size:22px;font-weight:700;font-family:var(--mono);color:#00E5FF;text-shadow:0 0 20px #00E5FF40;letter-spacing:2px;text-transform:uppercase}.hud-title p{font-size:11px;color:#00E5FF60;font-family:var(--mono);letter-spacing:3px}

.tools{background:#0B0B0F}

.dr-links{display:flex;flex-wrap:wrap;gap:8px}

</style>

/span></div></div><h3 style="font-size:14px;margin-bottom:14px;color:#888">📋 آخر النشاطات</h3><div class="feed"><div class="feed-item"><div class="feed-date">اليوم</div><div class="feed-text"><strong>بناء Command Center v4.0</strong> — 7 صفحات بتصاميم فريدة</div></div><div class="feed-item"><div class="feed-date">أمس</div><div class="feed-text"><strong>تدقيق أمني</strong> — 26 ثغرة أُصلحت في بوت ترون</div></div><div class="feed-item"><div class="feed-date">أمس</div><div class="feed-text"><strong>تنظيم iCloud</strong> — 5,400 ملف + خزنة 130 ملف</div></div><div class="feed-item"><div class="feed-date">23 مارس</div><div class="feed-text"><strong>منبهات العرس</strong> — تحديث الضيوف + أيام الحضور</div></div></div></div></div>`};
R.projects=()=>{
const rl={
"BRIX Travel System":["EasyBooking","WhatsApp CRM","BRIX Travel Website"],
"EasyBooking":["WhatsApp CRM","BRIX Travel System"],
"WhatsApp CRM":["EasyBooking","BRIX Travel System"],
"Wedding Planner":[],"Wapy.dev":[],"Command Center":[],"BRIX Travel Website":["BRIX Travel System"]
};
return`<div class="proj"><div class="proj-head"><h2>🚀 المشاريع النشطة</h2><p>${PRJ.length} مشاريع · ${PRJ.filter(p=>p.st==='a').length} نشط</p></div><div class="glass-grid">${PRJ.map(p=>{
const related=rl[p.name]||[];
const lines=(p.desc||'').split('\n').filter(l=>l.trim());
const mainDesc=lines.filter(l=>!l.startsWith('🔧')&&!l.startsWith('📊')&&!l.startsWith('🔄')&&!l.startsWith('📐')&&!l.startsWith('🚀')&&!l.startsWith('📱')&&!l.startsWith('🐳')&&!l.startsWith('💾')&&!l.startsWith('📡')&&!l.startsWith('🌍')&&!l.startsWith('📈')&&!l.startsWith('🎯')&&!l.startsWith('📋')&&!l.startsWith('🛠️')&&!l.startsWith('👥')&&!l.startsWith('🔔')&&!l.startsWith('👤')&&!l.startsWith('📄')&&!l.startsWith('🎨')&&!l.startsWith('⚠️')).slice(0,2);
return`<div class="glass" onclick="openDr('${E(p.name)}')">
<div class="glass-stripe" style="background:linear-gradient(90deg,${p.cl},${p.cl}60)"></div>
<div class="glass-top"><div class="glass-em">${p.em}</div><div><div class="glass-nm">${E(p.ar)}</div><span class="glass-st ${p.st}">${p.st==='a'?'نشط':'متوقف'}</span></div></div>
<div class="glass-desc">${mainDesc.map(l=>E(l)).join('\n')}</div>
<div class="glass-tags">${(p.tags||[]).slice(0,4).map(t=>`<span class="glass-tag">${E(t)}</span>`).join('')}</div>
${related.length?`<div style="margin-top:12px;padding-top:10px;border-top:1px solid #ffffff08;display:flex;gap:6px;align-items:center"><span style="font-size:9px;color:#555">مرتبط بـ</span>${related.map(r=>{const ri=[...PRJ,...BOT].find(x=>x.name===r);return ri?`<span style="font-size:14px;cursor:pointer" title="${E(r)}" onclick="event.stopPropagation();openDr('${E(r)}')">${ri.em}</span>`:''}).join('')}</div>`:''}
${p.links?`<div style="margin-top:8px;display:flex;gap:6px">${Object.entries(p.links).slice(0,2).map(([k,v])=>`<a href="${E(v)}" target="_blank" onclick="event.stopPropagation()" style="font-size:9px;color:${p.cl};text-decoration:none;padding:2px 8px;border:1px solid ${p.cl}30;border-radius:6px">🔗 ${E(k)}</a>`).join('')}</div>`:''}
</div>`}).join('')}</div></div>`};
R.server=()=>`<div class="srv"><div class="hud"><div class="hud-title"><h2>⟨ CONTABO VPS ⟩</h2><p>62.171.128.44 · UBUNTU 24 · ONLINE</p></div><div class="hud-gauges"><div class="gauge"><div class="gauge-v" style="color:#E8453C">77%</div><div class="gauge-l">Disk</div></div><div class="gauge"><div class="gauge-v" style="color:#10B981">10 GB</div><div class="gauge-l">RAM Free</div></div><div class="gauge"><div class="gauge-v" style="color:#F59E0B">23 GB</div><div class="gauge-l">Free Space</div></div><div class="gauge"><div class="gauge-v" style="color:#00E5FF">${SVC.filter(s=>s.st).length}</div><div class="gauge-l">Active</div></div></div><div class="hud-list">${SVC.map(s=>`<div class="hud-row"><div class="hud-dot ${s.st?'on':'off'}"></div><div class="hud-em">${s.em}</div><div class="hud-nm">${E(s.name)}</div><div class="hud-dt">${E(s.dt)}</div>${s.port!=='—'?`<div class="hud-pt">:${s.port}</div>`:''}</div>`).join('')}</div></div></div>`;
R.bots=()=>`<div class="bots"><div class="bots-head"><h2>🤖 مصنع البوتات</h2><p>بوتات Telegram والأدوات المالية</p></div><div class="bot-row">${BOT.map(b=>`<div class="bot3d" onclick="openDr('${E(b.name)}')"><div class="bot3d-glow" style="background:${b.cl};top:-20px;right:-20px"></div><span class="bot3d-em">${b.em}</span><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div class="bot3d-nm">${E(b.ar)}</div><span class="glass-st ${b.st}">${b.st==='a'?'نشط':'متوقف'}</span></div><div class="bot3d-desc">${E(b.desc)}</div><div class="glass-tags">${(b.tags||[]).map(t=>`<span class="glass-tag">${E(t)}</span>`).join('')}</div><div class="bot3d-meter"><div class="bot3d-fill" style="width:${b.st==='a'?'100':'35'}%;background:${b.cl}"></div></div></div>`).join('')}</div></div>`;
R.tools=()=>`<div class="tools"><div class="tools-head"><h2>🛠️ أدوات التطوير</h2><p>Claude Code + MCP + الإعدادات</p></div><div class="slides">${TL.map((t,i)=>`<div class="slide" id="sl-${i}"><div class="slide-head" onclick="toggleSlide(${i})"><div class="slide-dot" style="background:${t.cl};color:${t.cl}"></div><div class="slide-info"><div class="slide-nm">${E(t.ar)}</div><div class="slide-sub">${(t.tags||[]).join(' · ')}</div></div><span class="glass-st ${t.st}">${t.st==='a'?'نشط':'متوقف'}</span><div class="slide-arrow">◀</div></div><div class="slide-body"><div class="slide-content">${E(t.desc)}${t.path?'\n\n📁 '+E(t.path):''}${t.links?`<div class="slide-links">${Object.entries(t.links).map(([k,v])=>`<a class="slide-link" href="${E(v)}" target="_blank">🔗 ${E(k)}</a>`).join('')}</div>`:''}</div></div></div>`).join('')}</div></div>`;
R.cloud=()=>`<div class="cloud"><div class="cloud-head"><h2>☁️ الخدمات السحابية</h2><p>${CLD.length} خدمة متصلة</p></div><div class="orbit-field">${CLD.map(c=>`<div class="planet" ${c.lk?`onclick="window.open('${E(c.lk)}','_blank')"`:''}><div class="planet-ic">${c.em}</div><div class="planet-nm">${E(c.nm)}</div><div class="planet-dt">${E(c.dt)}</div></div>`).join('')}</div></div>`;
R.ideas=()=>{
const ideaRelated={"بوت واتساب ذكي":["WhatsApp CRM","BRIX Travel System"],"بوت تلقرام لبريكس":["Argaz Bot","BRIX Travel System"],"نظام تتبع مالي":["BRIX Travel System","Wapy.dev"],"BRIX Website v2":["BRIX Travel Website","BRIX Travel System"]};
return`<div style="background:linear-gradient(180deg,#0a0a14,#0B0B0F);position:relative;overflow:hidden">
<div style="position:absolute;top:50%;left:50%;width:600px;height:600px;transform:translate(-50%,-50%);background:radial-gradient(circle,#D946A808,transparent 70%);pointer-events:none"></div>
<div style="text-align:center;margin-bottom:32px;position:relative">
<div style="font-size:11px;color:#D946A8;font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px">خريطة الطريق</div>
<h2 style="font-size:28px;font-weight:700;letter-spacing:-1px">💡 أفكار المستقبل</h2>
<p style="font-size:12px;color:#666;margin-top:4px">${IDEAS.length} مشاريع مستقبلية مخططة</p>
</div>
<div style="max-width:700px;margin:0 auto;position:relative;padding-right:40px">
<div style="position:absolute;right:18px;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#D946A8,#6C3AED,#25D366,#E8453C);border-radius:2px"></div>
${IDEAS.map((idea,i)=>{
const rel=ideaRelated[idea.name]||[];
const lines=(idea.desc||'').split('\n').filter(l=>l.trim());
const headline=lines[0]||'';
const bullets=lines.filter(l=>l.startsWith('🎯')||l.startsWith('🔔')||l.startsWith('💱')||l.startsWith('📊')||l.startsWith('🔗')).slice(0,3);
return`<div style="position:relative;margin-bottom:28px;padding-right:40px">
<div style="position:absolute;right:-9px;top:20px;width:20px;height:20px;border-radius:50%;background:${idea.cl};border:3px solid #0B0B0F;box-shadow:0 0 12px ${idea.cl}40;z-index:1"></div>
<div style="background:linear-gradient(135deg,#14142a,#1a1a30);border:1px solid #ffffff0a;border-radius:16px;padding:24px;cursor:pointer;transition:all .35s;position:relative;overflow:hidden" onmouseover="this.style.borderColor='${idea.cl}30';this.style.transform='translateX(-6px)'" onmouseout="this.style.borderColor='#ffffff0a';this.style.transform='none'" onclick="openDr('${E(idea.name)}')">
<div style="position:absolute;top:-40px;left:-40px;width:150px;height:150px;background:${idea.cl};border-radius:50%;filter:blur(60px);opacity:.06;pointer-events:none"></div>
<div style="display:flex;align-items:center;gap:14px;margin-bottom:10px;position:relative">
<div style="font-size:36px">${idea.em}</div>
<div style="flex:1">
<div style="font-size:17px;font-weight:700">${E(idea.name)}</div>
<div style="font-size:11px;color:${idea.cl};font-weight:600;margin-top:2px">${E(idea.st)}</div>
</div>
<div style="padding:4px 12px;border-radius:20px;background:${idea.cl}15;color:${idea.cl};font-size:10px;font-weight:600">قريباً</div>
</div>
<div style="font-size:12px;color:#999;line-height:1.7;margin-bottom:10px">${E(headline)}</div>
${bullets.length?`<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px">${bullets.map(b=>`<div style="font-size:11px;color:#777;padding:4px 10px;background:#ffffff04;border-radius:6px;border-right:2px solid ${idea.cl}">${E(b)}</div>`).join('')}</div>`:''}
${rel.length?`<div style="display:flex;gap:6px;align-items:center;padding-top:8px;border-top:1px solid #ffffff06"><span style="font-size:9px;color:#555">يتكامل مع</span>${rel.map(r=>{const ri=[...PRJ,...BOT].find(x=>x.name===r);return ri?`<span style="font-size:13px;cursor:pointer" title="${E(r)}" onclick="event.stopPropagation();openDr('${E(r)}')">${ri.em}</span>`:''}).join('')}</div>`:''}
</div>
</div>`}).join('')}
</div>
</div>`};
R.archive=()=>`<div class="arch"><div class="arch-head"><h2>🗄️ الأرشيف</h2><p>المشاريع القديمة والملفات المؤرشفة</p></div><div class="pola-grid">${ARC.map(a=>`<div class="pola" onclick="openDr('${E(a.name)}')"><div class="pola-img">${a.em}</div><div class="pola-nm">${E(a.ar)}</div><div class="pola-desc">${E(a.desc)}</div></div>`).join('')}</div></div>`;
function toggleSlide(i){const el=document.getElementById('sl-'+i);document.querySelectorAll('.slide.open').forEach(e=>{if(e!==el)e.classList.remove('open')});el.classList.toggle('open')}
function openDr(key){const item=M[key];if(!item)return;document.getElementById('drBody').innerHTML=`<div style="font-size:36px;margin-bottom:8px">${item.em||''}</div><h2>${E(item.ar||item.name)}</h2><span class="glass-st ${item.st}" style="margin:6px 0 0;display:inline-flex">${item.st==='a'?'نشط':item.st==='p'?'متوقف':'أرشيف'}</span>${item.desc?`<div class="dr-sec"><h3>الوصف</h3><div class="dr-txt">${E(item.desc)}</div></div>`:''}${item.path?`<div class="dr-sec"><h3>المسار</h3><div class="dr-path">${E(item.path)}</div></div>`:''}${item.tags?`<div class="dr-sec"><h3>التقنيات</h3><div class="glass-tags">${item.tags.map(t=>`<span class="glass-tag">${E(t)}</span>`).join('')}</div></div>`:''}${item.links?`<div class="dr-sec"><h3>الروابط</h3><div class="dr-links">${Object.entries(item.links).map(([k,v])=>`<a class="dr-lk" href="${E(v)}" target="_blank">🔗 ${E(k)}</a>`).join('')}</div></div>`:''}`;document.getElementById('dr').classList.add('open');document.getElementById('drOv').classList.add('open')}
function closeDr(){document.getElementById('dr').classList.remove('open');document.getElementById('drOv').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDr()});
init();
</script>
</body>
</html>
