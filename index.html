<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Command Center</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--c1:#E8E4DD;--c2:#D4CFC5;--c3:#1A1915;--c4:#2D2B26;--c5:#8C8578;--c6:#B8B2A6;--ac:#C8A95C;--rd:#C44B3F;--gn:#5A9E6F;--bl:#4A7FB5;--pu:#7B6AB5}
body{background:var(--c1);color:var(--c3);font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;overflow-x:hidden;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* ═══ DOCK — macOS-style bottom nav ═══ */
.dock{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:4px;padding:8px 12px;background:rgba(26,25,21,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:22px;z-index:200;box-shadow:0 8px 32px #00000040}
.dock-i{width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:24px;border-radius:14px;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);position:relative}
.dock-i:hover{transform:scale(1.3) translateY(-8px);background:rgba(255,255,255,.12)}
.dock-i.on{background:var(--ac);transform:scale(1.1) translateY(-4px)}
.dock-i.on::after{content:'';position:absolute;bottom:-4px;width:4px;height:4px;border-radius:50%;background:#fff}
.dock-tip{display:none;position:absolute;top:-32px;background:var(--c3);color:#fff;font-size:10px;padding:4px 10px;border-radius:6px;white-space:nowrap;font-weight:600}
.dock-i:hover .dock-tip{display:block}

/* ═══ PAGES ═══ */
.page{display:none;min-height:100vh;padding-bottom:90px}
.page.on{display:block;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* ═══════════════════════════════════════════════ */
/*  PAGE 1: HOME — Cinematic hero + rings         */
/* ═══════════════════════════════════════════════ */
.hero{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 30%,var(--c1) 75%);z-index:1}
.hero-ring{position:absolute;border:1px solid var(--c2);border-radius:50%;opacity:.4;animation:spin 60s linear infinite}
.hero-ring:nth-child(1){width:300px;height:300px;animation-duration:80s}
.hero-ring:nth-child(2){width:500px;height:500px;animation-duration:120s;animation-direction:reverse}
.hero-ring:nth-child(3){width:700px;height:700px;animation-duration:160s}
@keyframes spin{to{transform:rotate(360deg)}}
.hero-content{position:relative;z-index:2}
.hero-greeting{font-size:14px;color:var(--c5);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.hero-name{font-size:52px;font-weight:700;letter-spacing:-2px;line-height:1.1}
.hero-name span{color:var(--ac)}

/* Countdown — split flap style */
.flap-wrap{display:flex;gap:12px;justify-content:center;margin:32px 0;direction:ltr}
.flap{background:var(--c3);color:var(--ac);width:72px;padding:16px 0;text-align:center;position:relative;overflow:hidden}
.flap::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:#ffffff15}
.flap-val{font-size:36px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.flap-lbl{font-size:9px;color:var(--c5);text-transform:uppercase;letter-spacing:1px;margin-top:6px}

/* Orbit stats */
.orbit-wrap{position:relative;width:280px;height:280px;margin:24px auto 0}
.orbit-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.orbit-center-v{font-size:48px;font-weight:700;color:var(--ac)}
.orbit-center-l{font-size:11px;color:var(--c5)}
.orbit-item{position:absolute;width:64px;height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
.orbit-item:hover{transform:scale(1.2)!important}
.orbit-em{font-size:22px}
.orbit-v{font-size:16px;font-weight:700;margin-top:2px}
.orbit-l{font-size:8px;color:var(--c5);text-transform:uppercase}

/* ═══════════════════════════════════════════════ */
/*  PAGE 2: PROJECTS — Magazine editorial layout  */
/* ═══════════════════════════════════════════════ */
.mag{max-width:900px;margin:0 auto;padding:60px 24px}
.mag-head{text-align:center;margin-bottom:48px;padding-bottom:24px;border-bottom:2px solid var(--c3)}
.mag-head h2{font-size:42px;font-weight:300;letter-spacing:-1px}
.mag-head h2 b{font-weight:700}
.mag-item{display:grid;grid-template-columns:80px 1fr;gap:0;margin-bottom:0;border-bottom:1px solid var(--c2);cursor:pointer;transition:all .2s;position:relative}
.mag-item:hover{background:rgba(200,169,92,.08)}
.mag-item:first-of-type{border-top:1px solid var(--c2)}
.mag-num{font-size:48px;font-weight:700;color:var(--c2);display:flex;align-items:center;justify-content:center;border-left:1px solid var(--c2);padding:24px 0}
.mag-body{padding:24px 28px}
.mag-cat{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--c5);margin-bottom:4px}
.mag-title{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.mag-title .em{font-size:26px}
.mag-excerpt{font-size:12px;color:var(--c5);line-height:1.7;max-height:40px;overflow:hidden}
.mag-tags{display:flex;gap:6px;margin-top:8px;direction:ltr;justify-content:flex-end}
.mag-tag{font-size:9px;padding:2px 8px;border:1px solid var(--c2);color:var(--c5);font-weight:600;letter-spacing:.5px}
.mag-status{position:absolute;top:24px;left:24px}

/* ═══════════════════════════════════════════════ */
/*  PAGE 3: SERVER — Real terminal emulation      */
/* ═══════════════════════════════════════════════ */
.terminal{max-width:800px;margin:40px auto;padding:0 24px}
.t-window{background:#0C0C0C;color:#33FF33;font-family:'SF Mono','Fira Code','Courier New',monospace;font-size:13px;line-height:1.8;overflow:hidden;box-shadow:0 20px 60px #00000050}
.t-chrome{background:#2D2D2D;padding:10px 16px;display:flex;align-items:center;gap:8px}
.t-btn{width:12px;height:12px;border-radius:50%}
.t-title{color:#999;font-size:11px;margin:0 auto;font-family:system-ui}
.t-body{padding:20px;max-height:70vh;overflow-y:auto}
.t-line{margin-bottom:2px;word-break:break-all}
.t-prompt{color:#33FF33}.t-cmd{color:#fff}.t-out{color:#999}
.t-hl{color:#FFD700}.t-gn{color:#33FF33}.t-rd{color:#FF4444}.t-bl{color:#4488FF}.t-gy{color:#666}
.t-cursor{display:inline-block;width:8px;height:15px;background:#33FF33;animation:blink 1s step-end infinite;vertical-align:text-bottom}
@keyframes blink{50%{opacity:0}}
.t-bar{display:flex;gap:20px;padding:8px 20px;background:#1A1A1A;border-top:1px solid #333}
.t-bar-item{color:#666;font-size:11px;font-family:system-ui}
.t-bar-item b{color:#33FF33}

/* ═══════════════════════════════════════════════ */
/*  PAGE 4: BOTS — Radar/sonar visualization      */
/* ═══════════════════════════════════════════════ */
.radar-page{max-width:900px;margin:0 auto;padding:40px 24px;display:flex;flex-direction:column;align-items:center}
.radar-title{font-size:36px;font-weight:300;letter-spacing:-1px;text-align:center;margin-bottom:40px}
.radar-title b{font-weight:700}
.radar-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;width:100%}
.radar-bot{position:relative;padding:28px;background:var(--c3);color:#E8E4DD;cursor:pointer;transition:all .3s;overflow:hidden}
.radar-bot:hover{transform:scale(1.02)}
.radar-pulse{position:absolute;top:20px;left:20px;width:12px;height:12px;border-radius:50%}
.radar-pulse.live{background:var(--gn);box-shadow:0 0 12px var(--gn)}
.radar-pulse.live::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--gn);animation:sonar 2s ease-out infinite}
.radar-pulse.off{background:var(--c5);opacity:.4}
@keyframes sonar{to{transform:scale(3);opacity:0}}
.radar-em{font-size:42px;margin-bottom:12px}
.radar-name{font-size:18px;font-weight:700;margin-bottom:4px}
.radar-desc{font-size:11px;color:var(--c6);line-height:1.7;margin-bottom:14px;white-space:pre-line}
.radar-line{height:1px;background:linear-gradient(90deg,transparent,var(--c5),transparent);margin:14px 0}
.radar-meta{display:flex;gap:8px;flex-wrap:wrap}
.radar-tag{font-size:9px;padding:3px 8px;border:1px solid var(--c5);color:var(--c6)}

/* ═══════════════════════════════════════════════ */
/*  PAGE 5: TOOLS — Blueprint/schematic style     */
/* ═══════════════════════════════════════════════ */
.blueprint{max-width:900px;margin:0 auto;padding:40px 24px}
.bp-title{font-size:36px;font-weight:300;letter-spacing:-1px;text-align:center;margin-bottom:40px}
.bp-title b{font-weight:700}
.bp-grid{background:#1B2838;color:#A4C8E8;padding:32px;position:relative;overflow:hidden;font-family:'SF Mono',monospace}
.bp-grid::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(100,150,200,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(100,150,200,.06) 1px,transparent 1px);background-size:24px 24px}
.bp-node{padding:20px;margin-bottom:16px;border:1px solid #2A4060;position:relative;cursor:pointer;transition:all .2s;background:#1B283880}
.bp-node:hover{border-color:var(--ac);background:#1B2838}
.bp-node::before{content:'◆';position:absolute;right:-8px;top:50%;transform:translateY(-50%);color:var(--ac);font-size:10px}
.bp-connector{width:1px;height:16px;background:#2A4060;margin:0 auto}
.bp-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#4A7090;margin-bottom:6px}
.bp-name{font-size:16px;font-weight:700;color:#E8E4DD;margin-bottom:4px;font-family:'IBM Plex Sans Arabic',system-ui}
.bp-detail{font-size:11px;color:#6A90B0;line-height:1.7;white-space:pre-line;font-family:'IBM Plex Sans Arabic',system-ui}
.bp-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-left:6px}

/* ═══════════════════════════════════════════════ */
/*  PAGE 6: CLOUD — Constellation star map        */
/* ═══════════════════════════════════════════════ */
.constellation{max-width:900px;margin:0 auto;padding:40px 24px}
.const-title{font-size:36px;font-weight:300;letter-spacing:-1px;text-align:center;margin-bottom:40px;color:var(--c3)}
.const-title b{font-weight:700}
.const-sky{background:linear-gradient(180deg,#0A0A1A 0%,#1A1A30 50%,#0A0A1A 100%);padding:48px 32px;position:relative;overflow:hidden;min-height:500px}
.const-sky::before{content:'';position:absolute;inset:0;background:radial-gradient(1px 1px at 20% 30%,#ffffff40,transparent),radial-gradient(1px 1px at 40% 70%,#ffffff30,transparent),radial-gradient(1px 1px at 60% 20%,#ffffff20,transparent),radial-gradient(1px 1px at 80% 50%,#ffffff40,transparent),radial-gradient(1px 1px at 10% 80%,#ffffff30,transparent),radial-gradient(1px 1px at 90% 10%,#ffffff20,transparent),radial-gradient(1px 1px at 50% 50%,#ffffff25,transparent),radial-gradient(1px 1px at 30% 60%,#ffffff35,transparent)}
.const-wrap{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;position:relative;z-index:1}
.star{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .3s;padding:16px}
.star:hover{transform:scale(1.15)}
.star-glow{width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:24px;position:relative}
.star-glow::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:radial-gradient(circle,#ffffff15,transparent 70%);transition:all .3s}
.star:hover .star-glow::before{inset:-12px;background:radial-gradient(circle,#C8A95C30,transparent 70%)}
.star-name{font-size:11px;font-weight:600;color:#AAA;letter-spacing:.5px}
.star-sub{font-size:9px;color:#666}

/* ═══════════════════════════════════════════════ */
/*  PAGE 7: ARCHIVE — Filing cabinet drawers      */
/* ═══════════════════════════════════════════════ */
.cabinet{max-width:700px;margin:0 auto;padding:40px 24px}
.cab-title{font-size:36px;font-weight:300;letter-spacing:-1px;text-align:center;margin-bottom:40px}
.cab-title b{font-weight:700}
.cab-unit{background:linear-gradient(180deg,#8B7F6B,#6B6155);margin-bottom:4px;cursor:pointer;transition:all .25s;overflow:hidden;position:relative}
.cab-unit:hover{transform:translateX(-8px)}
.cab-unit::before{content:'';position:absolute;right:50%;top:50%;transform:translate(50%,-50%);width:40px;height:12px;border:2px solid #A0956D;border-radius:2px}
.cab-handle{display:flex;align-items:center;gap:14px;padding:22px 24px;color:#E8E4DD}
.cab-em{font-size:24px}
.cab-info{flex:1}
.cab-name{font-size:15px;font-weight:700}
.cab-sub{font-size:10px;color:#C0B8A8;margin-top:2px}
.cab-expand{max-height:0;overflow:hidden;transition:max-height .4s ease;background:#5A5347}
.cab-unit.open .cab-expand{max-height:300px}
.cab-detail{padding:16px 24px;color:#D4CFC5;font-size:12px;line-height:1.8;white-space:pre-line}

/* ═══ DRAWER (detail panel) ═══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,25,21,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:300}
.overlay.on{display:block}
.drawer{position:fixed;top:0;bottom:0;left:0;width:min(480px,90vw);background:var(--c1);z-index:301;transform:translateX(-105%);transition:transform .4s cubic-bezier(.22,1,.36,1);overflow-y:auto;box-shadow:12px 0 40px #00000020}
.drawer.on{transform:translateX(0)}
.dr-close{position:sticky;top:0;background:var(--c1);padding:16px 20px;display:flex;justify-content:flex-end;z-index:1}
.dr-close button{background:none;border:1px solid var(--c2);width:36px;height:36px;font-size:18px;cursor:pointer;color:var(--c5);transition:all .15s}
.dr-close button:hover{background:var(--c2);color:var(--c3)}
.dr-body{padding:0 28px 40px}
.dr-emoji{font-size:48px;margin-bottom:12px}
.dr-title{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.dr-st{display:inline-block;font-size:10px;padding:4px 12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
.dr-st.a{background:var(--gn);color:#fff}.dr-st.p{background:var(--ac);color:var(--c3)}.dr-st.i{background:var(--c5);color:#fff}
.dr-section{margin-top:20px}
.dr-section h4{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--c5);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--c2)}
.dr-text{font-size:12px;color:var(--c4);line-height:1.9;white-space:pre-line}
.dr-code{font-family:'SF Mono',monospace;font-size:11px;background:var(--c3);color:var(--ac);padding:10px 14px;direction:ltr;word-break:break-all;margin-top:6px}
.dr-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.dr-link{padding:8px 18px;background:var(--c3);color:var(--ac);font-size:11px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px;direction:ltr}
.dr-link:hover{background:var(--c4)}

/* ═══ STATUS ═══ */
.st{font-size:9px;padding:3px 10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;display:inline-flex;align-items:center;gap:4px}
.st-a{background:var(--gn);color:#fff}.st-a::before{content:'';width:5px;height:5px;border-radius:50%;background:#fff;animation:pu 2s infinite}
.st-p{background:var(--ac);color:var(--c3)}.st-i{background:var(--c5);color:#fff}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .dock{bottom:8px;gap:2px;padding:6px 8px;border-radius:18px}
  .dock-i{width:40px;height:40px;font-size:20px;border-radius:12px}
  .hero-name{font-size:32px}
  .flap{width:52px;padding:10px 0}.flap-val{font-size:24px}
  .orbit-wrap{width:220px;height:220px}
  .mag-item{grid-template-columns:50px 1fr}.mag-num{font-size:28px}.mag-title{font-size:16px}
  .radar-grid{grid-template-columns:1fr}
  .bp-grid{padding:16px}
  .const-wrap{gap:10px}.star{padding:10px}
}
</style>
</head>

<!-- PAGES -->
<div id="pages"></div>

function openDr(k){
  const item=M[k];if(!item)return;
  const stT=item.st==='active'?'نشط':item.st==='paused'?'متوقف':'أرشيف';
  const stC=item.st==='active'?'a':item.st==='paused'?'p':'i';
  document.getElementById('drB').innerHTML=`
    <div class="dr-emoji">${item.em||''}</div>
    <div class="dr-title">${E(item.ar||item.nm)}</div>
    ${item.st?`<div class="dr-st ${stC}">${stT}</div>`:''}
    ${item.desc?`<div class="dr-section"><h4>الوصف</h4><div class="dr-text">${E(item.desc)}</div></div>`:''}
    ${item.path?`<div class="dr-section"><h4>المسار</h4><div class="dr-code">${E(item.path)}</div></div>`:''}

  `;

}
